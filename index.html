<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warped Grid SVG Demo</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f6f4ef;
      --ink: #161616;
      --muted: #6a675f;
      --red: #d4372f;
      --green: #148a45;
      --frame: #d8d2c6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #fff9ef 0%, var(--paper) 50%, #ece7dd 100%);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 18px;
    }

    .panel {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      padding: 14px 18px;
      border: 1px solid var(--frame);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls label {
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    .controls output {
      min-width: 3.5ch;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .controls input[type="number"] {
      width: 5.5rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--frame);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font: inherit;
      font-variant-numeric: tabular-nums;
    }

    .controls input[type="range"] {
      width: min(240px, 42vw);
      accent-color: var(--ink);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      letter-spacing: normal;
      text-transform: none;
      font-size: 0.9rem;
    }

    .toggle input[type="checkbox"] {
      margin: 0;
      accent-color: var(--ink);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .legend span::before {
      content: "";
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    .legend .horizontal {
      color: var(--red);
    }

    .legend .vertical {
      color: var(--green);
    }

    .stage {
      position: relative;
      border: 1px solid var(--frame);
      border-radius: 18px;
      overflow: hidden;
      background: white;
      box-shadow: 0 16px 40px rgba(68, 56, 34, 0.08);
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .caption {
      position: absolute;
      left: 16px;
      bottom: 14px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.02em;
    }

    @media (max-width: 720px) {
      main {
        padding: 12px;
      }

      .panel {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div>
        <h1>Warped Grid SVG</h1>
        <p>Static SVG paths traced directly on the warped grid field.</p>
      </div>
      <div>
        <div class="legend" aria-label="Legend">
          <span class="horizontal">Horizontal</span>
          <span class="vertical">Vertical</span>
        </div>
        <div class="controls">
          <label for="time-slider">Time</label>
          <input id="time-slider" type="range" min="0" max="600" step="0.1" value="16">
          <input id="time-input" type="number" min="0" max="600" step="0.1" value="16.0" inputmode="decimal" aria-label="Time value">
          <output id="time-value" for="time-slider time-input">16.0</output>
          <label class="toggle" for="grid-enabled">
            <input id="grid-enabled" type="checkbox" checked>
            <span>Trace grid</span>
          </label>
          <label class="toggle" for="diagonals-enabled">
            <input id="diagonals-enabled" type="checkbox" checked>
            <span>Draw diagonals</span>
          </label>
        </div>
      </div>
    </section>

    <section class="stage">
      <svg id="scene" xmlns="http://www.w3.org/2000/svg" aria-label="Warped grid demo"></svg>
      <div class="caption" id="caption"></div>
    </section>
  </main>
  <script type="module" src="./dist/src/demo.js"></script>
</body>
</html>
